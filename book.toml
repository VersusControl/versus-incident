[book]
authors = ["hoalongnatsu"]
language = "en"
multilingual = false
src = "src"
title = "Versus Incident"
description = "Open-source incident management with an AI SRE agent — Slack, Teams, PagerDuty, on-call, and log-driven detection."

[output.html]
default-theme = "light"
preferred-dark-theme = "light"
smart-punctuation = true
additional-css = ["src/theme/custom.css"]
additional-js = ["src/theme/page-toc.js", "src/theme/sidebar-brand.js"]
git-repository-url = "https://github.com/VersusControl/versus-incident"
edit-url-template = "https://github.com/VersusControl/versus-incident/edit/main/{path}"

[output.html.search]
enable = true
limit-results = 20
use-boolean-and = true
boost-title = 3
boost-hierarchy = 2
boost-paragraph = 1

[output.html.fold]
enable = true
level = 1
