---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: versusincidents.ops.versuscontrol.io
spec:
  group: ops.versuscontrol.io
  names:
    kind: VersusIncident
    listKind: VersusIncidentList
    plural: versusincidents
    shortNames:
    - vi
    singular: versusincident
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.agent.mode
      name: Mode
      type: string
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: VersusIncident is the Schema for the versusincidents API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VersusIncidentSpec is the desired state of a Versus Incident
              deployment.
            properties:
              agent:
                description: Agent configures the AI SRE agent.
                properties:
                  ai:
                    description: AI configures the LLM analyzer.
                    properties:
                      apiKeySecretName:
                        description: APIKeySecretName references a Secret holding
                          key `agent_ai_api_key`.
                        type: string
                      enable:
                        description: Enable turns the LLM analyzer on (required for
                          detect mode to call a model).
                        type: boolean
                      model:
                        default: gpt-4o-mini
                        description: Model is the model identifier, e.g. "gemini-2.5-flash-lite".
                        type: string
                      provider:
                        default: openai
                        description: |-
                          Provider selects the LLM backend: "openai" (default) or "gemini". It
                          maps to the right OpenAI-compatible endpoint internally — no base URL.
                        enum:
                        - openai
                        - gemini
                        type: string
                    type: object
                  enable:
                    description: Enable turns the agent on.
                    type: boolean
                  mode:
                    default: training
                    description: Mode is the agent operating mode.
                    enum:
                    - training
                    - shadow
                    - detect
                    type: string
                  pollInterval:
                    default: 15s
                    description: PollInterval is how often each source is pulled (Go
                      duration).
                    type: string
                  sources:
                    description: |-
                      Sources is the list of signal sources the agent tails, mirroring
                      agent_sources.yaml. Empty leaves the agent with no sources.
                    items:
                      description: SourceSpec is one agent signal source (mirrors
                        an agent_sources.yaml entry).
                      properties:
                        elasticsearch:
                          description: Elasticsearch configures an Elasticsearch source
                            (type=elasticsearch).
                          properties:
                            addresses:
                              description: Addresses is the list of node URLs.
                              items:
                                type: string
                              type: array
                            index:
                              description: Index is the index name or pattern.
                              type: string
                            query:
                              description: Query is a Lucene query string.
                              type: string
                          required:
                          - addresses
                          - index
                          type: object
                        enable:
                          description: Enable turns this source on.
                          type: boolean
                        file:
                          description: File configures a file-tailing source (type=file).
                          properties:
                            format:
                              description: Format is "text" (default) or "json".
                              type: string
                            fromBeginning:
                              description: FromBeginning replays the whole file from
                                offset 0 instead of tailing.
                              type: boolean
                            path:
                              description: Path to the log file.
                              type: string
                          required:
                          - path
                          type: object
                        loki:
                          description: Loki configures a Grafana Loki source (type=loki).
                          properties:
                            address:
                              description: Address is the Loki base URL, e.g. http://loki:3100.
                              type: string
                            query:
                              description: Query is a LogQL selector, e.g. {app="api"}
                                |= "error".
                              type: string
                            tenantID:
                              description: TenantID sets X-Scope-OrgID for multi-tenant
                                Loki.
                              type: string
                          required:
                          - address
                          - query
                          type: object
                        name:
                          description: Name is a unique source name.
                          type: string
                        type:
                          description: Type selects the source kind.
                          enum:
                          - file
                          - loki
                          - elasticsearch
                          type: string
                      required:
                      - name
                      - type
                      type: object
                    type: array
                type: object
              gatewaySecretName:
                description: |-
                  GatewaySecretName references a Secret holding key `gateway_secret`
                  (gates /api/admin/* and /api/agent/*). Required when the agent is enabled.
                type: string
              image:
                description: Image selects the container image.
                properties:
                  pullPolicy:
                    default: IfNotPresent
                    description: PullPolicy is the image pull policy.
                    enum:
                    - Always
                    - IfNotPresent
                    - Never
                    type: string
                  repository:
                    default: ghcr.io/versuscontrol/versus-incident
                    description: Repository is the image repository, e.g. "ghcr.io/versuscontrol/versus-incident".
                    type: string
                  tag:
                    default: v1.4.3
                    description: Tag is the image tag. Defaults to a recent published
                      tag.
                    type: string
                type: object
              replicas:
                default: 1
                description: |-
                  Replicas is the desired pod count. Keep at 1 when the agent is enabled
                  (the agent worker is single-writer to the catalog/detect log).
                format: int32
                minimum: 0
                type: integer
              telegram:
                description: Telegram configures the Telegram channel.
                properties:
                  enabled:
                    description: Enabled turns the Telegram channel on.
                    type: boolean
                  secretName:
                    description: |-
                      SecretName references a Secret holding keys `telegram_bot_token` and
                      `telegram_chat_id`. Required when Enabled is true.
                    type: string
                type: object
            type: object
          status:
            description: VersusIncidentStatus is the observed state of a Versus Incident
              deployment.
            properties:
              conditions:
                description: Conditions represent the latest observations of the resource's
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              readyReplicas:
                description: ReadyReplicas mirrors the managed Deployment's ready
                  replica count.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
