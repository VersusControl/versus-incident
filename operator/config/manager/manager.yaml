apiVersion: v1
kind: Namespace
metadata:
  name: versus-operator-system
  labels:
    app.kubernetes.io/name: versus-incident-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: versus-operator-controller-manager
  namespace: versus-operator-system
  labels:
    app.kubernetes.io/name: versus-incident-operator
    control-plane: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      serviceAccountName: versus-operator-controller-manager
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: manager
          image: versus-incident-operator:local
          imagePullPolicy: IfNotPresent
          args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=0
          ports:
            - name: health
              containerPort: 8081
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
      terminationGracePeriodSeconds: 10
