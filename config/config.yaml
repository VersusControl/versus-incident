name: versus
host: 0.0.0.0
port: 3000
public_host: ''

# Shared secret required by all admin endpoints (`/api/admin/*` and
# `/api/agent/*`). Clients send the same value in the `X-Gateway-Secret`
# header. When empty, admin endpoints reject every request and the agent
# refuses to start.
gateway_secret: ${GATEWAY_SECRET}

# Proxy configuration (global settings)
proxy:
  url: ${PROXY_URL}           # HTTP/HTTPS/SOCKS5 proxy URL (e.g., http://proxy.example.com:8080)
  username: ${PROXY_USERNAME} # Optional proxy username
  password: ${PROXY_PASSWORD} # Optional proxy password

alert:
  debug_body: true

  slack:
    enable: false
    token: ${SLACK_TOKEN}
    channel_id: ${SLACK_CHANNEL_ID}
    template_path: "config/slack_message.tmpl"
    message_properties:
      button_text: "Acknowledge Alert" # Custom text for the acknowledgment button
      button_style: "primary" # Button style: "primary" (default blue), "danger" (red), or empty for default gray
      disable_button: false # Set to true to disable the button, if you want to handle the alert acknowledgment in your own way
  
  telegram:
    enable: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    template_path: "config/telegram_message.tmpl"
    use_proxy: false # Set to true to use global proxy settings for Telegram API calls

  viber:
    enable: false
    api_type: ${VIBER_API_TYPE} # "bot" or "channel" - defaults to "channel"
    bot_token: ${VIBER_BOT_TOKEN}
    user_id: ${VIBER_USER_ID}
    channel_id: ${VIBER_CHANNEL_ID}
    template_path: "config/viber_message.tmpl"
    use_proxy: false # Set to true to use global proxy settings for Viber API calls

  email:
    enable: false
    smtp_host: ${SMTP_HOST}
    smtp_port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    to: ${EMAIL_TO}
    subject: ${EMAIL_SUBJECT}
    template_path: "config/email_message.tmpl"

  msteams:
    enable: false # Default value, will be overridden by MSTEAMS_ENABLE env var
    power_automate_url: ${MSTEAMS_POWER_AUTOMATE_URL} # Power Automate HTTP trigger URL (required)
    template_path: "config/msteams_message.tmpl"
    other_power_urls: # Optional: Enable overriding the default Power Automate flow using query parameters, eg /api/incidents?msteams_other_power_url=qc
      qc: ${MSTEAMS_OTHER_POWER_URL_QC}
      
  lark:
    enable: false # Default value, will be overridden by LARK_ENABLE env var
    webhook_url: ${LARK_WEBHOOK_URL} # Lark webhook URL (required)
    template_path: "config/lark_message.tmpl"
    use_proxy: false # Set to true to use global proxy settings for Lark API calls
    other_webhook_urls: # Optional: Enable overriding the default webhook URL using query parameters, eg /api/incidents?lark_other_webhook_url=dev
      dev: ${LARK_OTHER_WEBHOOK_URL_DEV}
      prod: ${LARK_OTHER_WEBHOOK_URL_PROD}

queue:
  enable: true
  debug_body: true

  # AWS SNS
  sns:
    enable: false
    https_endpoint_subscription_path: /sns # URI to receive SNS messages, e.g. ${host}:${port}/sns or ${https_endpoint_subscription}/sns
    # Options If you want to automatically create an sns subscription
    https_endpoint_subscription: ${SNS_HTTPS_ENDPOINT_SUBSCRIPTION} # If the user configures an HTTPS endpoint, then an SNS subscription will be automatically created, e.g. https://your-domain.com
    topic_arn: ${SNS_TOPIC_ARN}

  # AWS SQS
  sqs:
    enable: false
    queue_url: your_sqs_queue_url
  # GCP Pub Sub
  pubsub:
    enable: false
  # Azure Event Bus
  azbus:
    enable: false

oncall:
  ### Enable overriding using query parameters
  # /api/incidents?oncall_enable=false => Set to `true` or `false` to enable or disable on-call for a specific alert
  # /api/incidents?oncall_wait_minutes=0 => Set the number of minutes to wait for acknowledgment before triggering on-call. Set to `0` to trigger immediately
  initialized_only: false  # Initialize on-call feature but don't enable by default, requires 'oncall_enable=true' in query parameters
  enable: false # Use this to enable or disable on-call for all alerts
  wait_minutes: 3 # If you set it to 0, it means there's no need to check for an acknowledgment, and the on-call will trigger immediately
  provider: aws_incident_manager # Valid values: "aws_incident_manager", "pagerduty", "servicenow" or "incident_io"

  aws_incident_manager: # Used when provider is "aws_incident_manager"
    response_plan_arn: ${AWS_INCIDENT_MANAGER_RESPONSE_PLAN_ARN}
    other_response_plan_arns: # Optional: Enable overriding the default response plan ARN using query parameters, eg /api/incidents?awsim_other_response_plan=infra
      infra: ${AWS_INCIDENT_MANAGER_OTHER_RESPONSE_PLAN_ARN_INFRA}
      app: ${AWS_INCIDENT_MANAGER_OTHER_RESPONSE_PLAN_ARN_APP}
      db: ${AWS_INCIDENT_MANAGER_OTHER_RESPONSE_PLAN_ARN_DB}

  pagerduty: # Used when provider is "pagerduty"
    routing_key: ${PAGERDUTY_ROUTING_KEY} # Integration/Routing key for Events API v2 (REQUIRED)
    other_routing_keys: # Optional: Enable overriding the default routing key using query parameters, eg /api/incidents?pagerduty_other_routing_key=infra
      infra: ${PAGERDUTY_OTHER_ROUTING_KEY_INFRA}
      app: ${PAGERDUTY_OTHER_ROUTING_KEY_APP}
      db: ${PAGERDUTY_OTHER_ROUTING_KEY_DB}

  servicenow: # Used when provider is "servicenow"
    instance_url: ${SERVICENOW_INSTANCE_URL} # eg https://dev12345.service-now.com (REQUIRED)
    username: ${SERVICENOW_USERNAME} # REQUIRED
    password: ${SERVICENOW_PASSWORD} # REQUIRED
    table: incident # ServiceNow table to create records in; defaults to "incident"
    other_instance_urls: # Optional: Override the default instance using query parameters, eg /api/incidents?servicenow_other_instance=infra
      infra: ${SERVICENOW_OTHER_INSTANCE_URL_INFRA}
      app: ${SERVICENOW_OTHER_INSTANCE_URL_APP}
      db: ${SERVICENOW_OTHER_INSTANCE_URL_DB}

  incident_io: # Used when provider is "incident_io"
    api_key: ${INCIDENTIO_API_KEY} # Bearer API key for the HTTP alert source (REQUIRED)
    alert_source_config_id: ${INCIDENTIO_ALERT_SOURCE_CONFIG_ID} # HTTP alert source config ID (REQUIRED)
    other_alert_source_config_ids: # Optional: Override the default alert source using query parameters, eg /api/incidents?incidentio_other_alert_source=infra
      infra: ${INCIDENTIO_OTHER_ALERT_SOURCE_CONFIG_ID_INFRA}
      app: ${INCIDENTIO_OTHER_ALERT_SOURCE_CONFIG_ID_APP}
      db: ${INCIDENTIO_OTHER_ALERT_SOURCE_CONFIG_ID_DB}

redis: # Required for on-call functionality
  insecure_skip_verify: true # dev only
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}
  password: ${REDIS_PASSWORD}
  db: 0

# -----------------------------------------------------------------------------
# Storage backend used by BOTH the agent (catalog, shadow log, services) and
# the incident service (history shown in the UI).
#
# Pick a `type` and fill in the matching sub-block. Today only `file` is
# implemented end-to-end; `redis` and `database` are config stubs that error
# at startup if selected.
# -----------------------------------------------------------------------------
storage:
  type: file                     # file | redis | database (env: STORAGE_TYPE)
  file:
    max_incidents: 1000          # rolling cap; older records dropped on save
  # redis:                       # not yet implemented
  #   host: ${REDIS_HOST}
  #   port: 6379
  #   password: ${REDIS_PASSWORD}
  #   db: 1
  #   insecure_skip_verify: true
  #   key_prefix: "versus:storage:"
  #   max_incidents: 1000
  # database:                    # not yet implemented
  #   driver: postgres           # postgres | mysql | sqlite
  #   dsn: ${DATABASE_DSN}
  #   max_incidents: 5000

# -----------------------------------------------------------------------------
# AI agent mode (training | shadow | detect) — opt-in.
#
# When agent.enable=false (the default), nothing changes: no goroutines start,
# no new dependencies are loaded, no Redis keys are created.
#
# Recommended rollout:
#   1: mode=training, review the catalog via /api/agent/patterns
#   2: mode=shadow,   review the would-have-alerted log via /api/agent/shadow
#                     (also visible in stdout as `agent[shadow]: would alert ...`)
#   3: mode=detect    (AI emission ships in a follow-up milestone)
#
# -----------------------------------------------------------------------------
agent:
  enable: false                   # master switch (env: AGENT_ENABLE)
  mode: training                  # training | shadow | detect (env: AGENT_MODE)
  poll_interval: 30s              # how often each source is pulled
  lookback: 5m                    # initial backfill window on startup
  batch_max: 5000                 # safety cap per tick
  signal_max_bytes: 65536         # cap on Signal.Raw


  redaction:
    enable: true
    redact_ips: false             # IPs are usually useful context; opt-in
    extra_patterns:
      - "(?i)password=\\S+"
      - "Authorization:\\s*Bearer\\s+\\S+"

  catalog:
    persist_interval: 30s
    auto_promote_after: 50       # in detect mode, this many sightings = "known"
    # Catalog bounds, enforced on the persist tick. Only UNCURATED patterns
    # (no verdict, no tags) are evicted; operator-curated patterns are kept.
    max_patterns: 5000           # 0/negative = no cap
    retention: 720h              # drop uncurated patterns idle longer than this; "0" disables
    # Spike detection: a known pattern is re-flagged when its tick-level
    # frequency suddenly exceeds the EWMA (Exponentially Weighted Moving Average) baseline by `spike_multiplier`.
    # Two safety floors keep noise out:
    #   - spike_min_frequency: tick must have at least this many matches
    #     (avoids triggering on tiny absolute counts).
    #   - spike_min_baseline_count: pattern must have been seen this many
    #     times overall (avoids treating a barely-seen pattern's first big
    #     tick as a spike).
    # Set spike_multiplier: 0 to disable spike detection entirely.
    spike_multiplier: 5.0
    spike_min_frequency: 5
    spike_min_baseline_count: 20

  miner:
    similarity_threshold: 0.4
    tree_depth: 4
    max_children: 100

  regex:
    # Set to ".*" to train on every line; leave empty to require
    # an explicit named rule match.
    default_pattern: "(?i).*error.*"
    rules:
      - name: oom-killer
        pattern: "Out of memory: Killed process"
      - name: panic
        pattern: "(?i)panic:"
      - name: 5xx-burst
        pattern: "HTTP/[0-9.]+\\s+5\\d\\d"

  # AI analyzer — used in detect mode to assess unknown/spiking patterns.
  # Operator-triggered deep dives use the same `ai.*` defaults plus the
  # `ai.analyze.*` overrides below.
  ai:
    enable: false                   # master switch (env: AGENT_AI_ENABLE)
    api_key: ${AGENT_AI_API_KEY}
    model: "gpt-5.4-mini"
    # temperature: 0.0–2.0 (default 0.2). Set a NEGATIVE value (e.g. -1) to
    # omit temperature so the provider uses its own default.
    temperature: 0.2
    max_tokens: 4096
    max_calls_per_hour: 60          # 0 = unlimited
    cache_ttl: "1h"

    # AnalyzeAgent — powers `POST /api/admin/incidents/:id/analyze`
    # and the "Run analysis" button on the incident detail page.
    # Tool-calling: the model may invoke read-only tools (incident
    # lookup, pattern history, service summary) to gather context.
    # AnalyzeAgent NEVER emits a notification — runs are persisted
    # as analysis records only. It is active whenever `ai.enable` is
    # true; the block below only tunes it.
    analyze:
      # model: "gpt-4o"             # override the shared `ai.model` for analyze deep dives

  # New-service grace: when a previously unseen service starts emitting logs
  # in detect mode, it enters an implicit training window so the catalog can
  # build up before AI analysis kicks in. Set to "0" to disable.
  new_service_grace: 30m            # duration (env: AGENT_NEW_SERVICE_GRACE), ex 10m, 2h, etc.
  # Service detection — regexes applied to each log message to extract the
  # service name.
  service_patterns:
    # ECS / OpenTelemetry: "service.name":"foo", service.name=foo, service_name=foo
    # Used by: OpenTelemetry SDKs (all langs), Elastic Common Schema, Datadog APM
    - '(?i)\bservice[._-]?name["\s:=]+"?([A-Za-z0-9._-]+)'
    # logfmt key=value: service=foo, svc=foo, app=foo, component=foo
    # Used by: Go (zap, zerolog, logrus, slog), Kubernetes klog, Python structlog,
    #          Ruby semantic_logger, Rust tracing, .NET Serilog (compact format)
    - '(?i)\b(?:service|svc|app|component)\s*=\s*"?([A-Za-z0-9._-]+)'
    # JSON access logs: "service":"foo", "svc":"foo", "app":"foo", "component":"foo"
    # Used by: Node.js (Bunyan, Pino, Winston), .NET Serilog (JSON), Java logback-json,
    #          Python python-json-logger, AWS Lambda Powertools, nginx JSON access logs
    - '(?i)"(?:service|svc|app|component)"\s*:\s*"([A-Za-z0-9._-]+)"'
    # Two bracketed tokens: [logger] [service] ...
    # Used by: Python Django (`[django.request] [orders] ...`),
    #          some logback layouts that put logger first then MDC service.
    # The second bracket is the service; matched before the single-bracket rule
    # so this wins for two-bracket lines.
    # NOTE: no ^ anchor — sig.Message starts with the level (e.g. "ERROR [...]").
    - '\[[^\]]+\]\s+\[([A-Za-z0-9._-]+)\]'
    # Spring Boot / Java logback default pattern:
    #   2026-05-02 12:34:56.789 ERROR 1 --- [thread-name] [service-name] com.foo.Bar : ...
    # The service is the SECOND bracketed token after the "---" separator.
    - '---\s+\[[^\]]*\]\s+\[([A-Za-z0-9._-]+)\]'
    # syslog/journald/Docker: foo[123]:
    # Used by: Linux syslog (rsyslog/syslog-ng), systemd-journald, Docker JSON-file
    #          driver with tag, Postfix, sshd, cron, kernel
    # NOTE: no ^ anchor — level prefix precedes the token in sig.Message.
    # MUST come before the generic single-bracket rule so `nginx[1234]:` matches
    # this (→ "nginx") rather than [1234] (→ "1234").
    - '([A-Za-z0-9._-]+)\[\d+\]:'
    # Bracketed prefix: [foo]
    # Used by: Apache log4j (default), many CLIs, Erlang/Elixir Logger,
    #          Docker compose default formatter
    # NOTE: no ^ anchor — level prefix precedes the bracket in sig.Message.
    # This is the most generic bracket rule — keep it LAST among bracket patterns.
    - '\[([A-Za-z0-9._-]+)\]'
