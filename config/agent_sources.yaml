# -----------------------------------------------------------------------------
# Agent signal sources.
#
# Loaded by the main config when `agent.sources_path` points at this file.
# Keeping sources separate makes it easy to swap fixtures (file → ES) and to
# manage per-environment source lists without touching the rest of the config.
#
# Each entry must have:
#   name:    unique identifier (used in cursor keys and admin views)
#   type:    "file" or "elasticsearch"
#   enable:  true | false
# Plus one of `file:` / `elasticsearch:` blocks depending on `type`.
# -----------------------------------------------------------------------------
sources:
  # File source — easiest way to test the agent end-to-end. Drop a log file
  # in local/resource/ and point this at it. See local/resource/README.md.

  - name: noisy-app
    type: file
    enable: false
    file:
      path: ./local/resource/noisy-app.log
      format: text
      from_beginning: true
      max_lines_per_pull: 5000

  # - name: sample-app
  #   type: file
  #   enable: false                # set true to enable this source
  #   file:
  #     path: ./local/resource/sample-app.log
  #     format: text                # "text" or "json"
  #     from_beginning: true        # set false in production to tail from EOF
  #     # cursor_path: ./data/cursors/file-sample-app.cursor
  #     max_line_bytes: 65536
  #     max_lines_per_pull: 1000
  #     timestamp_layout: "2006-01-02T15:04:05Z07:00"
  #     JSON-mode field overrides:
  #     message_field: message
  #     timestamp_field: "@timestamp"
  #     severity_field: level

  - name: es-app
    type: elasticsearch
    enable: false
    elasticsearch:
      addresses:
        - http://localhost:9200
      index: "logstash-*"
      time_field: "@timestamp"
      query: '*'
      message_field: "@message"
      page_size: 500

  # - name: es-app-with-queries
