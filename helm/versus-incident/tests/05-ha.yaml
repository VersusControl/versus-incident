# HA / multi-instance (enterprise) — StatefulSet path with license + postgres.
replicaCount: 3
gatewaySecret: "test-secret-do-not-use-in-prod"

image:
  repository: ghcr.io/versuscontrol/versus-enterprise
  tag: dev

ha:
  enabled: true

storage:
  type: postgres
  postgres:
    dsn: "postgres://versus:pass@pg:5432/versus?sslmode=require"

enterprise:
  licenseKey: "PLACEHOLDER-NOT-A-REAL-KEY"
