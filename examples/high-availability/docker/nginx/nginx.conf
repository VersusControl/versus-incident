# nginx load balancer for the two Versus replicas. Round-robin (the default),
# no sticky sessions — sessions converge via Postgres so any replica serves any
# request. This is the single endpoint a reader hits (http://localhost:8080).
events {}

http {
  # Both replicas. nginx resolves these from the compose network. max_fails +
  # fail_timeout let nginx skip a replica that is briefly down (e.g. mid-rollout)
  # and fall back to the healthy one.
  upstream versus {
    server versus-0:3000 max_fails=3 fail_timeout=10s;
    server versus-1:3000 max_fails=3 fail_timeout=10s;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://versus;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Retry the other replica if one refuses/errs mid-rollout.
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }
  }
}
