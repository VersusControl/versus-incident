services:
  redis:
    image: redis:7-alpine
    container_name: versus-es-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-versus}"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-versus}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: versus-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: versus-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    restart: unless-stopped

  versus:
    image: ghcr.io/versuscontrol/versus-incident:latest
    container_name: versus-es-app
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GATEWAY_SECRET: ${GATEWAY_SECRET:-change-me}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-versus}
      SLACK_ENABLE: ${SLACK_ENABLE:-false}
      SLACK_TOKEN: ${SLACK_TOKEN:-}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
      TELEGRAM_ENABLE: ${TELEGRAM_ENABLE:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      AGENT_ENABLE: ${AGENT_ENABLE:-true}
      AGENT_MODE: ${AGENT_MODE:-training}
      AGENT_AI_ENABLE: ${AGENT_AI_ENABLE:-false}
      AGENT_AI_API_KEY: ${AGENT_AI_API_KEY:-}
      AGENT_AI_MODEL: ${AGENT_AI_MODEL:-gpt-4o-mini}
    volumes:
      - ./config:/app/config:ro
      - versus-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
  versus-data:
  es-data:
