services:
  # One-shot: generate a self-signed cert for Redis TLS into a shared volume.
  # Runs once per `docker compose up` and exits 0. Other services wait on
  # `condition: service_completed_successfully`.
  redis-tls-init:
    image: alpine:3.20
    container_name: versus-loki-redis-tls-init
    command:
      - sh
      - -c
      - |
        set -e
        cd /tls
        if [ -f server.crt ] && [ -f server.key ] && [ -f ca.crt ]; then
          echo "TLS material already present; skipping."
          exit 0
        fi
        apk add --no-cache openssl >/dev/null
        openssl req -x509 -nodes -newkey rsa:2048 -days 3650 \
          -keyout server.key -out server.crt \
          -subj "/CN=redis" \
          -addext "subjectAltName=DNS:redis,DNS:localhost,IP:127.0.0.1"
        cp server.crt ca.crt
        chmod 0644 server.crt server.key ca.crt
        echo "Generated self-signed cert for redis."
    volumes:
      - redis-tls:/tls

  redis:
    image: redis:7-alpine
    container_name: versus-loki-redis
    depends_on:
      redis-tls-init:
        condition: service_completed_successfully
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-versus}
      - --port
      - "0"
      - --tls-port
      - "6379"
      - --tls-cert-file
      - /tls/server.crt
      - --tls-key-file
      - /tls/server.key
      - --tls-ca-cert-file
      - /tls/ca.crt
      - --tls-auth-clients
      - "no"
    volumes:
      - redis-data:/data
      - redis-tls:/tls:ro
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - redis-cli
        - --tls
        - --insecure
        - -a
        - ${REDIS_PASSWORD:-versus}
        - ping
      interval: 5s
      timeout: 3s
      retries: 5

  loki:
    image: grafana/loki:2.9.4
    container_name: versus-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 3s
      retries: 10

  grafana:
    image: grafana/grafana-oss:10.4.2
    container_name: versus-loki-grafana
    depends_on:
      loki:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped

  versus:
    image: ghcr.io/versuscontrol/versus-incident:dev-5324869
    container_name: versus-loki-app
    depends_on:
      redis:
        condition: service_healthy
      loki:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GATEWAY_SECRET: ${GATEWAY_SECRET:-change-me}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-versus}
      SLACK_ENABLE: ${SLACK_ENABLE:-false}
      SLACK_TOKEN: ${SLACK_TOKEN:-}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
      TELEGRAM_ENABLE: ${TELEGRAM_ENABLE:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      AGENT_ENABLE: ${AGENT_ENABLE:-true}
      AGENT_MODE: ${AGENT_MODE:-training}
      AGENT_AI_ENABLE: ${AGENT_AI_ENABLE:-false}
      AGENT_AI_API_KEY: ${AGENT_AI_API_KEY:-}
      AGENT_AI_MODEL: ${AGENT_AI_MODEL:-gpt-4o-mini}
    volumes:
      - ./config:/app/config:ro
      - versus-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
  redis-tls:
  versus-data:
  loki-data:
  grafana-data:
